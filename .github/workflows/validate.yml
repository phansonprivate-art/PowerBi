name: PBIP Validation (Phase 3 Checks)

on:
  push:
    branches: [ main, develop, feature/* ]
    paths:
      - '06_TEMPLATES/**'
      - '05_AUTOMATION_SCRIPTS/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]

env:
  TEMPLATE_DIR: '06_TEMPLATES'
  SCRIPTS_DIR: '05_AUTOMATION_SCRIPTS'

jobs:
  validate-json:
    name: 'CHECK 3: JSON Syntax'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Validate JSON files in Template
        run: |
          python ${{ env.SCRIPTS_DIR }}/validate-json-syntax.py --pbip-path "${{ env.TEMPLATE_DIR }}"
        continue-on-error: false

  validate-schema:
    name: 'CHECK 4: Schema Versions'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check definition.pbism = v4.2
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "${{ env.TEMPLATE_DIR }}" -Filter "definition.pbism" -Recurse
          foreach ($file in $files) {
            $content = Get-Content $file.FullName -Raw | ConvertFrom-Json
            if ($content.version -ne "4.2") {
              Write-Error "ERROR: definition.pbism must have version 4.2, found '$($content.version)' in $($file.FullName)"
              exit 1
            }
            Write-Host "OK: $($file.FullName) version=$($content.version)"
          }

      - name: Check correct schema URLs
        shell: pwsh
        run: |
          # Verify report.json uses correct schema path
          $reportFiles = Get-ChildItem -Path "${{ env.TEMPLATE_DIR }}" -Filter "report.json" -Recurse
          foreach ($file in $reportFiles) {
            $content = Get-Content $file.FullName -Raw
            if ($content -match 'fabric/pbip/report/') {
              Write-Error "ERROR: Wrong schema URL pattern 'fabric/pbip/report/' in $($file.FullName). Must use 'fabric/item/report/definition/'"
              exit 1
            }
            Write-Host "OK: $($file.FullName) schema URL correct"
          }

          # Verify visual.json uses correct schema path
          $visualFiles = Get-ChildItem -Path "${{ env.TEMPLATE_DIR }}" -Filter "visual.json" -Recurse
          foreach ($file in $visualFiles) {
            $content = Get-Content $file.FullName -Raw
            if ($content -match 'fabric/pbip/report/') {
              Write-Error "ERROR: Wrong schema URL pattern in $($file.FullName)"
              exit 1
            }
          }

  validate-patterns:
    name: 'CHECK 5: Forbidden Patterns'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no "Source" in SourceRef
        shell: pwsh
        run: |
          $visual_files = Get-ChildItem -Path "${{ env.TEMPLATE_DIR }}" -Filter "visual.json" -Recurse
          foreach ($file in $visual_files) {
            $content = Get-Content $file.FullName -Raw
            if ($content -match '"Source"\s*:') {
              Write-Error "ERROR: SourceRef muss Entity nutzen, nicht Source in $($file.FullName)"
              exit 1
            }
          }
          Write-Host "OK: No forbidden 'Source' patterns found"

      - name: Check no filterConfig
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "${{ env.TEMPLATE_DIR }}" -Filter "visual.json" -Recurse
          foreach ($file in $files) {
            $content = Get-Content $file.FullName -Raw
            if ($content -match '"filterConfig"') {
              Write-Error "ERROR: filterConfig verboten in $($file.FullName)"
              exit 1
            }
          }
          Write-Host "OK: No forbidden 'filterConfig' patterns found"

      - name: Check no prototypeQuery
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "${{ env.TEMPLATE_DIR }}" -Filter "visual.json" -Recurse
          foreach ($file in $files) {
            $content = Get-Content $file.FullName -Raw
            if ($content -match '"prototypeQuery"') {
              Write-Error "ERROR: prototypeQuery verboten in $($file.FullName)"
              exit 1
            }
          }
          Write-Host "OK: No forbidden 'prototypeQuery' patterns found"

  validate-completeness:
    name: 'CHECK 6: File Completeness'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Template completeness
        shell: pwsh
        run: |
          $templateRoot = "${{ env.TEMPLATE_DIR }}"

          # Check .pbip exists
          $pbip = Get-ChildItem -Path $templateRoot -Filter "*.pbip" -Recurse
          if (-not $pbip) { Write-Error "No .pbip file found in template"; exit 1 }
          Write-Host "OK: .pbip found: $($pbip.FullName)"

          # Check pages.json exists
          $pages = Get-ChildItem -Path $templateRoot -Filter "pages.json" -Recurse
          if (-not $pages) { Write-Error "No pages.json found"; exit 1 }
          Write-Host "OK: pages.json found: $($pages.FullName)"

          # Check .platform files (2x: Report + SemanticModel)
          $platforms = Get-ChildItem -Path $templateRoot -Filter ".platform" -Recurse
          if ($platforms.Count -lt 2) { Write-Warning ".platform count=$($platforms.Count), expected 2" }
          Write-Host "OK: .platform files found: $($platforms.Count)"

          # Check definition.pbir exists
          $pbir = Get-ChildItem -Path $templateRoot -Filter "definition.pbir" -Recurse
          if (-not $pbir) { Write-Error "No definition.pbir found"; exit 1 }
          Write-Host "OK: definition.pbir found"

          # Check definition.pbism exists
          $pbism = Get-ChildItem -Path $templateRoot -Filter "definition.pbism" -Recurse
          if (-not $pbism) { Write-Error "No definition.pbism found"; exit 1 }
          Write-Host "OK: definition.pbism found"

  summary:
    name: 'Validation Summary'
    runs-on: ubuntu-latest
    needs: [validate-json, validate-schema, validate-patterns, validate-completeness]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.validate-json.result }}" != "success" ] || \
             [ "${{ needs.validate-schema.result }}" != "success" ] || \
             [ "${{ needs.validate-patterns.result }}" != "success" ] || \
             [ "${{ needs.validate-completeness.result }}" != "success" ]; then
            echo "VALIDATION FAILED"
            exit 1
          else
            echo "ALL CHECKS PASSED"
          fi
