trigger:
  branches:
    include:
    - main
    - develop
    - feature/*
  paths:
    include:
    - POWER_BI_PBIP_AUTOMATION/**

pr:
  branches:
    include:
    - main
    - develop

pool:
  vmImage: 'windows-latest'

variables:
  pythonVersion: '3.11'
  targetDir: '$(Build.SourcesDirectory)/POWER_BI_PBIP_AUTOMATION'

stages:
- stage: Validate
  displayName: 'Phase 3 Validation Checks'
  jobs:
  
  - job: ValidateJSONSyntax
    displayName: 'CHECK 3: JSON Syntax'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
        addToPath: true
    
    - script: |
        python $(targetDir)\05_AUTOMATION_SCRIPTS\validate-json-syntax.py
      displayName: 'Validate all JSON files'
      continueOnError: false

  - job: ValidateSchemaVersions
    displayName: 'CHECK 4: Schema Versions'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
        addToPath: true
    
    - script: |
        # Check für definition.pbism version 4.2
        findstr "\"version\": \"4.2\"" $(targetDir)\**\definition.pbism >nul 2>&1
        IF ERRORLEVEL 1 (
          echo ERROR: definition.pbism version muss 4.2 sein
          exit /b 1
        )
      displayName: 'Check definition.pbism = v4.2'
    
    - script: |
        # Check für version.json 2.0.0
        findstr "\"version\": \"2.0.0\"" $(targetDir)\**\version.json >nul 2>&1
        IF ERRORLEVEL 1 (
          echo ERROR: version.json muss 2.0.0 sein
          exit /b 1
        )
      displayName: 'Check version.json = v2.0.0'

  - job: ValidateForbiddenPatterns
    displayName: 'CHECK 5: Forbidden Patterns'
    steps:
    - script: |
        REM Check für "Source" statt "Entity" in visual.json
        findstr /R "\"Source\":" $(targetDir)\**\visual.json >nul 2>&1
        IF ERRORLEVEL 0 (
          echo ERROR: SourceRef muss Entity nutzen, nicht Source!
          exit /b 1
        )
        exit /b 0
      displayName: 'No "Source" in SourceRef'
    
    - script: |
        REM Check für "filterConfig" in visual.json
        findstr "\"filterConfig\":" $(targetDir)\**\visual.json >nul 2>&1
        IF ERRORLEVEL 0 (
          echo ERROR: filterConfig ist verboten in visual.json!
          exit /b 1
        )
        exit /b 0
      displayName: 'No filterConfig Top-Level'
    
    - script: |
        REM Check für "prototypeQuery" in visual.json
        findstr "\"prototypeQuery\":" $(targetDir)\**\visual.json >nul 2>&1
        IF ERRORLEVEL 0 (
          echo ERROR: prototypeQuery ist verboten!
          exit /b 1
        )
        exit /b 0
      displayName: 'No prototypeQuery Top-Level'

  - job: ValidateFileCompleteness
    displayName: 'CHECK 6: File Completeness'
    steps:
    - script: |
        REM CHECK pages.json immer vorhanden?
        if not exist "$(targetDir)\**\pages.json" (
          echo ERROR: pages.json MUSS in Report/definition existieren!
          exit /b 1
        )
      displayName: 'pages.json present'
    
    - script: |
        REM CHECK .platform in SemanticModel + Report?
        if not exist "$(targetDir)\**\.platform" (
          echo ERROR: .platform muss in SemanticModel und Report sein!
          exit /b 1
        )
      displayName: '.platform present'

  - job: ValidateTMDLFields
    displayName: 'CHECK 7: TMDL Field Validation'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
        addToPath: true
    
    - script: |
        python $(targetDir)\05_AUTOMATION_SCRIPTS\validate-visuals.py
      displayName: 'Validate visual.json Entity/Property'
      continueOnError: false

- stage: Documentation
  displayName: 'Documentation & Cleanup'
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: GenerateReport
    displayName: 'Generate Validation Report'
    steps:
    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'validation-reports'

- stage: Security
  displayName: 'Security Scan'
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: CredentialScan
    displayName: 'Scan Credentials'
    steps:
    - task: CredScan@3
      inputs:
        toolMajorVersion: 'V2'
        outputFormat: 'sarif'
      continueOnError: true
