trigger:
  branches:
    include:
    - main
    - develop
    - feature/*
  paths:
    include:
    - 06_TEMPLATES/**
    - 05_AUTOMATION_SCRIPTS/**

pr:
  branches:
    include:
    - main
    - develop

pool:
  vmImage: 'windows-latest'

variables:
  pythonVersion: '3.11'
  templateDir: '$(Build.SourcesDirectory)/06_TEMPLATES'
  scriptsDir: '$(Build.SourcesDirectory)/05_AUTOMATION_SCRIPTS'

stages:
- stage: Validate
  displayName: 'Phase 3 Validation Checks'
  jobs:

  - job: ValidateJSONSyntax
    displayName: 'CHECK 3: JSON Syntax'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
        addToPath: true

    - script: |
        python "$(scriptsDir)\validate-json-syntax.py" --pbip-path "$(templateDir)"
      displayName: 'Validate all JSON files in Template'
      continueOnError: false

  - job: ValidateSchemaVersions
    displayName: 'CHECK 4: Schema Versions'
    steps:
    - powershell: |
        # Check definition.pbism version 4.2
        $files = Get-ChildItem -Path "$(templateDir)" -Filter "definition.pbism" -Recurse
        foreach ($file in $files) {
          $content = Get-Content $file.FullName -Raw | ConvertFrom-Json
          if ($content.version -ne "4.2") {
            Write-Error "definition.pbism must have version 4.2, found '$($content.version)'"
            exit 1
          }
          Write-Host "OK: $($file.FullName) version=$($content.version)"
        }
      displayName: 'Check definition.pbism = v4.2'

    - powershell: |
        # Check version.json = 2.0.0
        $files = Get-ChildItem -Path "$(templateDir)" -Filter "version.json" -Recurse
        foreach ($file in $files) {
          $content = Get-Content $file.FullName -Raw | ConvertFrom-Json
          if ($content.version -ne "2.0.0") {
            Write-Error "version.json must have version 2.0.0, found '$($content.version)'"
            exit 1
          }
          Write-Host "OK: $($file.FullName) version=$($content.version)"
        }
      displayName: 'Check version.json = v2.0.0'

    - powershell: |
        # Verify correct schema URL patterns (no legacy fabric/pbip/report/ paths)
        $jsonFiles = Get-ChildItem -Path "$(templateDir)" -Filter "*.json" -Recurse
        $errors = @()
        foreach ($file in $jsonFiles) {
          $content = Get-Content $file.FullName -Raw
          if ($content -match 'fabric/pbip/report/') {
            $errors += "Wrong schema URL in $($file.FullName): uses legacy 'fabric/pbip/report/' instead of 'fabric/item/report/definition/'"
          }
        }
        if ($errors.Count -gt 0) {
          $errors | ForEach-Object { Write-Error $_ }
          exit 1
        }
        Write-Host "OK: All schema URLs use correct patterns"
      displayName: 'Check schema URL patterns'

  - job: ValidateForbiddenPatterns
    displayName: 'CHECK 5: Forbidden Patterns'
    steps:
    - powershell: |
        $visual_files = Get-ChildItem -Path "$(templateDir)" -Filter "visual.json" -Recurse
        foreach ($file in $visual_files) {
          $content = Get-Content $file.FullName -Raw
          if ($content -match '"Source"\s*:') {
            Write-Error "SourceRef muss Entity nutzen, nicht Source in $($file.FullName)"
            exit 1
          }
          if ($content -match '"filterConfig"') {
            Write-Error "filterConfig verboten in $($file.FullName)"
            exit 1
          }
          if ($content -match '"prototypeQuery"') {
            Write-Error "prototypeQuery verboten in $($file.FullName)"
            exit 1
          }
        }
        Write-Host "OK: No forbidden patterns found in $($visual_files.Count) visual.json files"
      displayName: 'Check forbidden patterns'

  - job: ValidateFileCompleteness
    displayName: 'CHECK 6: File Completeness'
    steps:
    - powershell: |
        $root = "$(templateDir)"

        $required = @(
          @{ Name = ".pbip"; Filter = "*.pbip" },
          @{ Name = "pages.json"; Filter = "pages.json" },
          @{ Name = "definition.pbir"; Filter = "definition.pbir" },
          @{ Name = "definition.pbism"; Filter = "definition.pbism" }
        )

        foreach ($check in $required) {
          $found = Get-ChildItem -Path $root -Filter $check.Filter -Recurse
          if (-not $found) {
            Write-Error "$($check.Name) not found in template"
            exit 1
          }
          Write-Host "OK: $($check.Name) found"
        }

        $platforms = Get-ChildItem -Path $root -Filter ".platform" -Recurse
        Write-Host "OK: .platform files found: $($platforms.Count)"
      displayName: 'Verify template completeness'

- stage: Documentation
  displayName: 'Documentation & Cleanup'
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: GenerateReport
    displayName: 'Generate Validation Report'
    steps:
    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'validation-reports'

- stage: Security
  displayName: 'Security Scan'
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: CredentialScan
    displayName: 'Scan Credentials'
    steps:
    - task: CredScan@3
      inputs:
        toolMajorVersion: 'V2'
        outputFormat: 'sarif'
      continueOnError: true
